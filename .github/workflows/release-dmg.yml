name: Release macOS DMG

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

jobs:
  build-and-release:
    runs-on: macos-14
    defaults:
      run:
        working-directory: macos-app
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Resolve version from tag
        id: version
        run: |
          # GITHUB_REF_NAME is set for every trigger (branch name on a
          # manual/workflow_dispatch run, not just tag pushes), so it can't
          # tell "real tag push" apart from "manual run against a branch" -
          # checking GITHUB_REF's refs/tags/ prefix can. Without this, a
          # manual run against e.g. `master` published a release literally
          # tagged/named "master" instead of a synthetic version number.
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            RAW_TAG="$GITHUB_REF_NAME"
            VERSION="${RAW_TAG#v}"
          else
            VERSION="0.0.${GITHUB_RUN_NUMBER}"
            RAW_TAG="v${VERSION}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$RAW_TAG" >> "$GITHUB_OUTPUT"

      - name: Build (unsigned)
        run: |
          # -destination is required once the Lexume target also supports an
          # iPad destination (Supported Destinations) - without it,
          # xcodebuild's default resolution is no longer unambiguous.
          xcodebuild \
            -project Lexume.xcodeproj \
            -scheme Lexume \
            -destination 'generic/platform=macOS' \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            clean build

      # Not a real Developer ID signature — there's no paid Apple Developer
      # account configured for this project. Ad-hoc signing just keeps
      # Gatekeeper from reporting the app as "damaged"; users still need to
      # right-click → Open on first launch (see release notes below).
      - name: Ad-hoc code sign
        run: |
          APP_PATH="build/Build/Products/Release/Lexume.app"
          codesign --force --deep --sign - "$APP_PATH"

      - name: Build DMG
        run: |
          APP_PATH="build/Build/Products/Release/Lexume.app"
          STAGING="dmg-staging"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          cp -R "$APP_PATH" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname "Lexume" -srcfolder "$STAGING" -ov -format UDZO \
            "Lexume-${{ steps.version.outputs.version }}.dmg"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Lexume ${{ steps.version.outputs.version }}
          files: macos-app/Lexume-${{ steps.version.outputs.version }}.dmg
          body: |
            Lexume for macOS — ${{ steps.version.outputs.version }}

            This build is **unsigned / ad-hoc** (no paid Apple Developer
            account is configured for this project yet), so macOS Gatekeeper
            will flag it on first launch. To open it:

            1. Download and open the `.dmg`, drag **Lexume** into **Applications**.
            2. In Finder, **right-click (or Control-click) Lexume.app → Open**.
            3. Click **Open** in the dialog that appears. This is only needed once.

            Requires macOS 14 or later.
