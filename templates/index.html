{% extends "base.html" %}
{% block title %}English Reader & Translator{% endblock %}

{% block content %}
<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <h2>⚙️ Settings</h2>

    <section>
      <h3>API Keys</h3>
      <label>Gemini API Key
        <input type="password" id="gemini_key" placeholder="AIzaSy…">
      </label>
      <label>ElevenLabs API Key
        <input type="password" id="eleven_key" placeholder="sk_…">
      </label>
      <label>Voice ID
        <input type="text" id="voice_id" placeholder="JBFqnCBsd6RMkjVDRZzb">
      </label>
    </section>

    <hr>

    <section>
      <h3>Models</h3>
      <label>Gemini Model
        <select id="gemini_model">
          {% for id, label in gemini_models %}
          <option value="{{ id }}" {% if id == default_gemini %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </label>
      <label>ElevenLabs Model
        <select id="eleven_model">
          {% for id, label in eleven_models %}
          <option value="{{ id }}" {% if id == default_eleven %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </label>
    </section>

    <hr>

    <section>
      <h3>Voice Settings</h3>
      <label>Stability <span class="slider-val" id="stability_val">0.50</span>
        <input type="range" id="stability" min="0" max="1" step="0.05" value="0.5"
               oninput="document.getElementById('stability_val').textContent=parseFloat(this.value).toFixed(2)">
      </label>
      <label>Similarity Boost <span class="slider-val" id="similarity_val">0.75</span>
        <input type="range" id="similarity" min="0" max="1" step="0.05" value="0.75"
               oninput="document.getElementById('similarity_val').textContent=parseFloat(this.value).toFixed(2)">
      </label>
      <label>Speed <span class="slider-val" id="speed_val">1.00</span>
        <input type="range" id="speed" min="0.5" max="2" step="0.05" value="1.0"
               oninput="document.getElementById('speed_val').textContent=parseFloat(this.value).toFixed(2)">
      </label>
      <label>Style <span class="slider-val" id="style_val">0.00</span>
        <input type="range" id="style" min="0" max="1" step="0.05" value="0.0"
               oninput="document.getElementById('style_val').textContent=parseFloat(this.value).toFixed(2)">
      </label>
    </section>

    <hr>

    <section>
      <h3>Mock / Debug</h3>
      <label class="checkbox">
        <input type="checkbox" id="mock_gemini"> Skip Gemini (use hardcoded text)
      </label>
      <label class="checkbox">
        <input type="checkbox" id="mock_eleven"> Skip ElevenLabs (use mock audio)
      </label>
    </section>
  </aside>

  <!-- ── Main ── -->
  <div class="main-col">
    <h1>English Reader &amp; Translator</h1>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="file">📄 Upload File</button>
      <button class="tab" data-tab="text">✏️ Paste Text</button>
    </div>

    <!-- File tab -->
    <div class="tab-panel active" id="tab-file">
      <div class="drop-zone" id="drop-zone">
        <input type="file" id="file-input" accept=".pdf,.txt,.md" hidden>
        <p>Drop a PDF, TXT or MD file here, or <button type="button" onclick="document.getElementById('file-input').click()">browse</button></p>
        <p id="file-name" class="file-name"></p>
      </div>

      <div id="pdf-pages" style="display:none" class="pages-row">
        <p id="pdf-info" class="info-box"></p>
        <label class="checkbox">
          <input type="checkbox" id="all-pages" checked> Process all pages
        </label>
        <div id="page-range-row" style="display:none">
          <input type="text" id="page-range" placeholder="e.g. 1-3, 5, 7-9">
          <span id="page-range-hint" class="hint"></span>
        </div>
      </div>
    </div>

    <!-- Text tab -->
    <div class="tab-panel" id="tab-text">
      <textarea id="paste-text" placeholder="Type or paste text here…" rows="10"></textarea>
    </div>

    <!-- Generate button -->
    <button id="btn-generate" class="btn-primary" onclick="runPipeline()">🚀 Generate Audio</button>

    <!-- Status -->
    <div id="status" class="status-box" style="display:none">
      <div class="spinner-row"><div class="spinner"></div> <span id="status-msg">Processing…</span></div>
      <div id="error-msg" class="error-msg" style="display:none"></div>
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
// ── Tab switching ──────────────────────────────────────────────────────────
document.querySelectorAll(".tab").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab, .tab-panel").forEach(el => el.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("tab-" + btn.dataset.tab).classList.add("active");
  });
});

// ── File drop & pick ───────────────────────────────────────────────────────
const dropZone  = document.getElementById("drop-zone");
const fileInput = document.getElementById("file-input");
let selectedFile = null;

function handleFile(f) {
  selectedFile = f;
  document.getElementById("file-name").textContent = f.name;
  if (f.name.toLowerCase().endsWith(".pdf")) {
    document.getElementById("pdf-pages").style.display = "block";
    document.getElementById("pdf-info").textContent = `Selected: ${f.name}`;
  } else {
    document.getElementById("pdf-pages").style.display = "none";
  }
}

fileInput.addEventListener("change", () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });
dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("drag-over"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
dropZone.addEventListener("drop", e => {
  e.preventDefault(); dropZone.classList.remove("drag-over");
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

// ── PDF all-pages toggle ───────────────────────────────────────────────────
document.getElementById("all-pages").addEventListener("change", function() {
  document.getElementById("page-range-row").style.display = this.checked ? "none" : "block";
});

// ── Pipeline ───────────────────────────────────────────────────────────────
const activeTab = () => document.querySelector(".tab.active").dataset.tab;

function setStatus(msg, error) {
  const box = document.getElementById("status");
  const errEl = document.getElementById("error-msg");
  box.style.display = "block";
  document.getElementById("status-msg").textContent = msg;
  if (error) {
    errEl.textContent = error;
    errEl.style.display = "block";
    document.querySelector(".spinner-row").style.display = "none";
  } else {
    errEl.style.display = "none";
    document.querySelector(".spinner-row").style.display = "flex";
  }
}

async function runPipeline() {
  const geminiKey = document.getElementById("gemini_key").value.trim();
  const elevenKey = document.getElementById("eleven_key").value.trim();
  const mockGemini = document.getElementById("mock_gemini").checked;
  const mockEleven = document.getElementById("mock_eleven").checked;
  const tab = activeTab();

  // ── Step 1: Extract ──────────────────────────────────────────────────────
  setStatus("Step 1/2 — Extracting text with Gemini…");

  const fd = new FormData();
  fd.append("gemini_key",   geminiKey);
  fd.append("gemini_model", document.getElementById("gemini_model").value);
  fd.append("mock_gemini",  mockGemini);

  if (tab === "text") {
    const t = document.getElementById("paste-text").value.trim();
    if (!t) { setStatus("", "Please paste some text first."); return; }
    fd.append("text", t);
  } else {
    if (!selectedFile) { setStatus("", "Please select a file first."); return; }
    fd.append("file", selectedFile);
    const allPages = document.getElementById("all-pages").checked;
    if (!allPages) fd.append("pages", document.getElementById("page-range").value.trim());
  }

  let extractRes;
  try {
    const r = await fetch("/extract", { method: "POST", body: fd });
    extractRes = await r.json();
    if (!r.ok) throw new Error(extractRes.detail || r.statusText);
  } catch (e) {
    setStatus("", `Gemini error: ${e.message}`); return;
  }

  const sessionId = extractRes.session_id;

  // ── Step 2: Generate ─────────────────────────────────────────────────────
  setStatus("Step 2/2 — Generating audio with ElevenLabs…");

  try {
    const r = await fetch("/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        session_id:       sessionId,
        eleven_model:     document.getElementById("eleven_model").value,
        voice_id:         document.getElementById("voice_id").value.trim(),
        eleven_key:       elevenKey,
        stability:        parseFloat(document.getElementById("stability").value),
        similarity_boost: parseFloat(document.getElementById("similarity").value),
        speed:            parseFloat(document.getElementById("speed").value),
        style:            parseFloat(document.getElementById("style").value),
        mock_eleven:      mockEleven,
      }),
    });
    const genRes = await r.json();
    if (!r.ok) throw new Error(genRes.detail || r.statusText);
  } catch (e) {
    setStatus("", `ElevenLabs error: ${e.message}`); return;
  }

  // ── Redirect to result ───────────────────────────────────────────────────
  window.location.href = `/result/${sessionId}`;
}
</script>
{% endblock %}
